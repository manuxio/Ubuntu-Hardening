# /etc/systemd/system/php<VER>-fpm.service.d/00-hardening.conf
# Installed by harden-os.sh (the <VER> is filled in at install time).
# Host-wide PHP-FPM sandbox. Per-site drop-ins (<site>-reach.conf) ADD their own
# ReadWritePaths — systemd unions ReadWritePaths across drop-ins.
[Service]
# Whole filesystem read-only except ReadWritePaths (per-site drop-ins add site dirs).
ProtectSystem=strict
ReadWritePaths=/run/php /var/log

# Private /tmp (kills cross-site /tmp leakage), no access to /home.
PrivateTmp=true
ProtectHome=true
# NoNewPrivileges is intentionally NOT set: it makes the kernel reject php-fpm's
# apparmor_hat transition (change_profile -> php-fpm//<pool> fails with EPERM,
# no AVC — it's the no_new_privs gate, not AppArmor). The per-pool hat denies ALL
# exec, which is a strictly stronger control than NoNewPrivileges, so we rely on
# it instead. (If you run a pool WITHOUT an apparmor_hat, add NoNewPrivileges=yes
# back via a per-pool drop-in.)

# Kernel / control surface lockdown.
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true
RestrictSUIDSGID=true
RestrictRealtime=true
LockPersonality=true
SystemCallFilter=@system-service
SystemCallErrorNumber=EPERM

# Files created by workers stay group-writable so web_user + ftp_user (both in the
# www-data group) can manage each other's files in the setgid runtime dirs.
UMask=0007

# Contain anything a pool spawns.
KillMode=control-group
