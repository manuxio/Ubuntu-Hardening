# /etc/logrotate.d/hardening   (installed by harden-os.sh)
# -----------------------------------------------------------------------------
# Rotates the PER-SITE PHP-FPM logs that harden-vhost keeps under each vhost's
# own logs/ directory (default: /var/www/html/<site>/logs/). nginx's per-site
# logs live in /var/log/nginx and are already rotated by the distro's
# /etc/logrotate.d/nginx, so they are intentionally NOT duplicated here.
#
# copytruncate is used so php-fpm keeps writing to the same fd — no reload/signal
# needed. `su www-data www-data` lets logrotate act inside the setgid, www-data-
# owned logs directory without tripping its root-owned-dir safety check.
# -----------------------------------------------------------------------------
/var/www/html/*/logs/*.log {
    weekly
    rotate 12
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su www-data www-data
}
