# /etc/nginx/snippets/tls-params.conf  (installed by harden-os.sh)
# Included from a site's HTTPS (listen 443 ssl) server block, e.g.:
#     include /etc/nginx/snippets/tls-params.conf;
# Kept in a snippet (server context) so it never collides with the ssl_* lines
# already present in the default nginx.conf http block.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;
