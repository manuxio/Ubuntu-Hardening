# /etc/modprobe.d/hardening.conf  (installed by harden-os.sh)
# Prevent loading rarely-used, larger-attack-surface filesystems and network
# protocols on a server (common Lynis/CIS findings). `install <mod> /bin/true`
# makes any load attempt run /bin/true instead of inserting the module.
#
# NOTE: squashfs is intentionally NOT disabled — snapd needs it on Ubuntu.
# Remove the usb-storage line if this host legitimately uses USB storage.

# --- uncommon filesystems ---
install cramfs    /bin/true
install freevxfs  /bin/true
install jffs2     /bin/true
install hfs       /bin/true
install hfsplus   /bin/true
install udf       /bin/true

# --- uncommon network protocols ---
install dccp      /bin/true
install sctp      /bin/true
install rds       /bin/true
install tipc      /bin/true

# --- removable storage (server) ---
install usb-storage /bin/true
