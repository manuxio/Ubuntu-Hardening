# /etc/ssh/sshd_config.d/00-hardening.conf   (installed by harden-os.sh)
# =============================================================================
# Named 00- so it is read BEFORE any cloud-image drop-in: sshd keeps the FIRST
# value seen for each keyword, so these win. KEY-BASED AUTH ONLY — do not enable
# password login here. Validated with `sshd -t` before the service is reloaded;
# a reload never drops existing sessions, so this cannot lock out a live admin.
# =============================================================================
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes
UsePAM yes

# session / forwarding surface
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitTunnel no
GatewayPorts no
PermitUserEnvironment no

# brute-force / idle limits
MaxAuthTries 3
MaxSessions 2
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2
TCPKeepAlive no
Compression no

# hygiene / logging
StrictModes yes
UseDNS no
LogLevel VERBOSE
Banner /etc/issue.net

# strong, modern crypto only
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-hellman-group-exchange-sha256
