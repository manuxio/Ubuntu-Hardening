# /etc/nginx/conf.d/00-hardening.conf  (installed by harden-os.sh)
# Server-wide nginx hardening (http context). Per-site server blocks live in
# sites-available/* and are generated by harden-vhost.sh.
#
# NOTE: TLS directives (ssl_protocols/ciphers/session) are intentionally NOT set
# here — Ubuntu's default nginx.conf already sets some, and redefining them in
# the http context is a duplicate-directive error. They live in
# snippets/tls-params.conf instead, included by each HTTPS server block.

# Don't advertise the version in the Server header / error pages.
server_tokens off;

# Sane global body cap (per-site blocks can raise it to match upload_max_filesize).
client_max_body_size 32m;

# Slow-loris / abuse mitigations.
client_body_timeout   15s;
client_header_timeout 15s;
send_timeout          15s;
keepalive_timeout     30s;
large_client_header_buffers 4 8k;

# Security response headers are applied per server block via:
#     include /etc/nginx/snippets/security-headers.conf;
