# /etc/nginx/snippets/security-headers.conf  (installed by harden-os.sh)
# Included from each site's server block. `always` so they apply to error
# responses too. Tune CSP per app — Joomla admin needs inline scripts/styles.
add_header X-Content-Type-Options   "nosniff" always;
add_header X-Frame-Options          "SAMEORIGIN" always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
# Enable once the site is HTTPS-only (matches flipping session.cookie_secure on):
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
